# App runs in Docker; MySQL + Nginx + Certbot live on the host (see CLAUDE.md §5).
# The container talks to the host MySQL via host networking / host.docker.internal.
services:
  api:
    build: .
    container_name: yuan-automotive-api
    restart: always
    env_file:
      - .env
    ports:
      - "${APP_PORT:-3001}:${APP_PORT:-3001}"
    volumes:
      - ./uploads:/app/uploads
    extra_hosts:
      # lets the container reach the host-run MySQL as 127.0.0.1 alias
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:'+(process.env.APP_PORT||3001)+'/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
